<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1920" height="1080" fill="#FFFFFF"/>
  <!-- 顶部标题底 -->
  <rect x="0" y="0" width="1920" height="120" fill="#F5F7FA" rx="8"/>
  <!-- 底部装饰线 -->
  <rect x="0" y="1020" width="1920" height="1" fill="#165DFF"/>
  
  <!-- 标题 -->
  <text x="80" y="70" font-family="Microsoft YaHei, sans-serif" font-size="28" font-weight="bold" fill="#333333">科技馆建筑设计</text>
  <text x="1400" y="75" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#666666">功能设计与技术指标</text>
  
  <!-- 左栏：功能分区与空间特色 -->
  <rect x="80" y="150" width="560" height="820" fill="#F9FAFB" rx="8"/>
  <rect x="100" y="170" width="200" height="36" fill="#165DFF" rx="8"/>
  <text x="120" y="195" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">🏛️ 功能分区与空间特色</text>
  
  <text x="100" y="250" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#333333">1. 五大功能体系</text>
  <text x="120" y="290" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 公众展览区（核心）</text>
  <text x="120" y="320" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 公共服务区</text>
  <text x="120" y="350" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 会议办公区</text>
  <text x="120" y="380" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 后勤保障区</text>
  <text x="120" y="410" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 交通联系区</text>
  
  <text x="100" y="470" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#333333">2. 展厅核心参数</text>
  <text x="120" y="510" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 最大跨度：<tspan font-weight="bold" fill="#165DFF">12m</tspan>（无柱空间）</text>
  <text x="120" y="540" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 展厅净高：<tspan font-weight="bold" fill="#165DFF">≥4.5m</tspan></text>
  <text x="120" y="570" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 适配：大型展品陈列+灵活布展</text>
  
  <text x="100" y="630" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#333333">3. 面积分配（总2023㎡）</text>
  <!-- 条形图 -->
  <rect x="120" y="670" width="500" height="30" fill="#E5E6EB"/>
  <rect x="120" y="670" width="285" height="30" fill="#165DFF"/>
  <rect x="405" y="670" width="60" height="30" fill="#86909C"/>
  <rect x="465" y="670" width="25" height="30" fill="#69B1FF"/>
  <rect x="490" y="670" width="35" height="30" fill="#4E5969"/>
  <rect x="525" y="670" width="95" height="30" fill="#C9CDD4"/>
  
  <text x="120" y="720" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#333333">展厅区 1149㎡(57%)</text>
  <text x="405" y="720" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#333333">办公 236㎡(12%)</text>
  <text x="465" y="720" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#333333">服务 113㎡(5%)</text>
  <text x="490" y="720" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#333333">后勤 143㎡(7%)</text>
  <text x="525" y="720" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#333333">交通 382㎡(19%)</text>
  
  <!-- 中栏：建筑形象与交通设计 -->
  <rect x="680" y="150" width="560" height="820" fill="#F9FAFB" rx="8"/>
  <rect x="700" y="170" width="200" height="36" fill="#165DFF" rx="8"/>
  <text x="720" y="195" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">🚀 建筑形象与交通设计</text>
  
  <text x="700" y="250" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#333333">1. 立面设计</text>
  <text x="720" y="290" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 核心：<tspan font-weight="bold">白色大理石+Low-E中空玻璃幕墙</tspan></text>
  <text x="720" y="320" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 入口：钢框架+白色PTFE膜材悬挑雨棚</text>
  <text x="720" y="350" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 室内：灰白主调+线性灯光+智能导视</text>
  
  <text x="700" y="410" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#333333">2. 流线组织</text>
  <!-- 公众流线箭头 -->
  <path d="M720 470 L1180 470" stroke="#165DFF" stroke-width="3" marker-end="url(#arrowhead-blue)"/>
  <text x="720" y="455" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#165DFF">入口</text>
  <text x="800" y="455" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#165DFF">序厅</text>
  <text x="880" y="455" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#165DFF">小1</text>
  <text x="960" y="455" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#165DFF">小2</text>
  <text x="1040" y="455" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#165DFF">小3</text>
  <text x="1120" y="455" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#165DFF">大2</text>
  <text x="1180" y="455" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#165DFF">出口</text>
  
  <text x="700" y="510" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 独立流线：</text>
  <text x="720" y="540" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">  贵宾：贵宾室→大展厅①（独立使用）</text>
  <text x="720" y="570" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">  后勤/办公：东侧入口→库房/办公区</text>
  
  <text x="700" y="630" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#333333">3. 疏散保障</text>
  <text x="720" y="670" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 每个防火分区<tspan font-weight="bold" fill="#165DFF">2个</tspan>安全出口</text>
  <text x="720" y="700" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 展览区任一点至出口≤<tspan font-weight="bold" fill="#165DFF">30m</tspan></text>
  <text x="720" y="730" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 配套：疏散指示+应急照明+地面蓄光标识</text>
  
  <!-- 右栏：绿色节能与技术指标 -->
  <rect x="1280" y="150" width="560" height="820" fill="#F9FAFB" rx="8"/>
  <rect x="1300" y="170" width="200" height="36" fill="#165DFF" rx="8"/>
  <text x="1320" y="195" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">🌱 绿色节能与技术指标</text>
  
  <text x="1300" y="250" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#333333">1. 核心节能措施</text>
  <text x="1320" y="290" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">☀️ 屋顶光伏发电：100㎡，年发电约<tspan font-weight="bold" fill="#165DFF">1.2万kWh</tspan></text>
  <text x="1320" y="320" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">💧 雨水收集系统：绿化灌溉+道路清洗</text>
  <text x="1320" y="350" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">🏠 围护结构节能：</text>
  <text x="1340" y="380" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 外墙K≤0.45W/(m²·K)</text>
  <text x="1340" y="410" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 屋面K≤0.35W/(m²·K)</text>
  <text x="1340" y="440" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 外窗K≤2.0W/(m²·K)，SC≤0.40</text>
  
  <text x="1300" y="500" font-family="Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#333333">2. 机电系统配置</text>
  <text x="1320" y="540" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 暖通：VRV多联机+新风系统</text>
  <text x="1320" y="570" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 消防：自动喷淋+消火栓+火灾报警</text>
  <text x="1320" y="600" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 电气：三级负荷，预留智能照明接口</text>
  <text x="1320" y="630" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#666666">• 弱电：综合布线+安防监控+展厅多媒体</text>
  
  <!-- 箭头标记 -->
  <defs>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#165DFF"/>
    </marker>
  </defs>
  
  <!-- 页脚 -->
  <text x="80" y="1050" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#666666">某科技馆建筑设计项目</text>
  <text x="1820" y="1050" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" fill="#165DFF">2/2</text>
</svg>