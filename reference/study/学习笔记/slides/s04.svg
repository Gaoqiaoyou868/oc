<text x="100" y="280" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#4E5969">团队名称：不学BIM</text><text x="100" y="310" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#4E5969">指导老师：张晓杰   王宪</text><text x="100" y="340" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#4E5969">团队成员：齐继浩   苏久耀   李宸希</text><text x="100" y="370" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#4E5969">团队成员皆来自建筑电气系，建筑电气与智能化专业</text>
