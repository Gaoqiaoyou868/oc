<text x="100" y="680" font-family="Microsoft YaHei,sans-serif" font-size="18" font-weight="bold" fill="#165DFF">学校简介</text>
<text x="100" y="720" font-family="Microsoft YaHei,sans-serif" font-size="15" fill="#4E5969">河南城建学院（Henan University of Urban Construction）位于河南省平顶山市，</text>
<text x="100" y="750" font-family="Microsoft YaHei,sans-serif" font-size="15" fill="#4E5969">是河南省唯一一所以工科为主、以“城建”为特色的多学科协调发展的省属本科高校，</text>
<text x="100" y="780" font-family="Microsoft YaHei,sans-serif" font-size="15" fill="#4E5969">也是全国仅有的以“城建”命名的两所本科高校之一。</text>
<text x="80" y="1072" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#C9CDD4">来源：科技馆建筑设计 · 不学BIM</text></svg>