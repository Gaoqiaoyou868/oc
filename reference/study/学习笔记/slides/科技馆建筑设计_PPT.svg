<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <filter id="shadow-light" x="-2%" y="-2%" width="104%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.04"/>
    </filter>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#165DFF"/>
      <stop offset="100%" stop-color="#4080FF"/>
    </linearGradient>
    <linearGradient id="bar-exh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#165DFF"/>
      <stop offset="100%" stop-color="#4080FF"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#165DFF"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1920" height="100" fill="#F5F7FA"/>
  <rect x="0" y="100" width="1920" height="1" fill="#E5E6EB"/>

  <text x="80" y="58" font-family="Microsoft YaHei,sans-serif" font-size="26" font-weight="bold" fill="#1D2129">科技馆建筑设计 · 设计要点</text>
  <text x="80" y="82" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#86909C">功能分区 · 建筑形象 · 交通设计</text>

  <rect x="1820" y="16" width="44" height="28" rx="14" fill="#E8F0FF"/>
  <text x="1836" y="36" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#165DFF">1/2</text>

  <!-- ===== 左栏 ===== -->
  <rect x="40" y="124" width="900" height="928" fill="#FAFBFC" rx="10" filter="url(#shadow)"/>
  <rect x="58" y="140" width="220" height="36" rx="8" fill="url(#hdr)"/>
  <text x="74" y="164" font-family="Microsoft YaHei,sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">功能分区与空间特色</text>

  <!-- 五大功能 -->
  <text x="70" y="216" font-family="Microsoft YaHei,sans-serif" font-size="15" font-weight="bold" fill="#1D2129">五大功能体系</text>
  <line x1="70" y1="226" x2="910" y2="226" stroke="#E5E6EB" stroke-width="1"/>

  <text x="82" y="256" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#4E5969">● 公众展览区（核心）</text>
  <text x="300" y="256" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#86909C">大展厅+小展厅+序厅</text>
  <text x="82" y="282" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#4E5969">● 公共服务区</text>
  <text x="300" y="282" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#86909C">接待室+贵宾室+文创厅</text>
  <text x="82" y="308" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#4E5969">● 会议办公区</text>
  <text x="300" y="308" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#86909C">会议室+办公室+值班室+广播室</text>
  <text x="82" y="334" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#4E5969">● 后勤保障区</text>
  <text x="300" y="334" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#86909C">库房+储藏室+设备间</text>
  <text x="82" y="360" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#4E5969">● 交通联系区</text>
  <text x="300" y="360" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#86909C">楼梯间+走廊</text>

  <!-- 参数卡片 -->
  <text x="70" y="410" font-family="Microsoft YaHei,sans-serif" font-size="15" font-weight="bold" fill="#1D2129">展厅核心参数</text>
  <line x1="70" y1="420" x2="910" y2="420" stroke="#E5E6EB" stroke-width="1"/>

  <rect x="70" y="440" width="168" height="76" rx="8" fill="#FFFFFF" filter="url(#shadow-light)" stroke="#E5E6EB" stroke-width="1"/>
  <text x="108" y="468" font-family="Microsoft YaHei,sans-serif" font-size="24" font-weight="bold" fill="#165DFF">12 m</text>
  <text x="86" y="500" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#86909C">最大跨度（无柱）</text>

  <rect x="258" y="440" width="168" height="76" rx="8" fill="#FFFFFF" filter="url(#shadow-light)" stroke="#E5E6EB" stroke-width="1"/>
  <text x="300" y="468" font-family="Microsoft YaHei,sans-serif" font-size="24" font-weight="bold" fill="#165DFF">≥4.5 m</text>
  <text x="284" y="500" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#86909C">展厅净高</text>

  <rect x="446" y="440" width="168" height="76" rx="8" fill="#FFFFFF" filter="url(#shadow-light)" stroke="#E5E6EB" stroke-width="1"/>
  <text x="490" y="468" font-family="Microsoft YaHei,sans-serif" font-size="24" font-weight="bold" fill="#165DFF">≥300</text>
  <text x="508" y="500" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#86909C">大展厅面积（㎡）</text>

  <text x="70" y="548" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#4E5969">适配：大型展品陈列 + 灵活布展</text>

  <!-- 面积分配 -->
  <text x="70" y="596" font-family="Microsoft YaHei,sans-serif" font-size="15" font-weight="bold" fill="#1D2129">面积分配（使用面积约 2,023㎡）</text>
  <line x1="70" y1="606" x2="910" y2="606" stroke="#E5E6EB" stroke-width="1"/>

  <rect x="70" y="636" width="830" height="32" rx="4" fill="#F0F1F3"/>
  <rect x="70" y="636" width="473" height="32" rx="4" fill="url(#bar-exh)"/>
  <rect x="543" y="636" width="100" height="32" rx="4" fill="#86909C"/>
  <rect x="643" y="636" width="42" height="32" rx="4" fill="#69B1FF"/>
  <rect x="685" y="636" width="58" height="32" rx="4" fill="#4E5969"/>
  <rect x="743" y="636" width="157" height="32" rx="4" fill="#C9CDD4"/>

  <text x="70" y="694" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#165DFF">● 展厅 1,149㎡</text>
  <text x="70" y="712" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#86909C">57%</text>
  <text x="220" y="694" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#4E5969">● 办公 236㎡</text>
  <text x="220" y="712" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#86909C">12%</text>
  <text x="355" y="694" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#69B1FF">● 服务 113㎡</text>
  <text x="355" y="712" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#86909C">5%</text>
  <text x="480" y="694" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#4E5969">● 后勤 143㎡</text>
  <text x="480" y="712" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#86909C">7%</text>
  <text x="600" y="694" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#6B7785">● 交通 382㎡</text>
  <text x="600" y="712" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#86909C">19%</text>

  <!-- 楼层对比 -->
  <rect x="70" y="748" width="830" height="28" rx="4" fill="#F0F1F3"/>
  <text x="86" y="768" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#4E5969">1F</text>
  <rect x="130" y="748" width="530" height="28" rx="4" fill="url(#bar-exh)"/>
  <rect x="130" y="748" width="382" height="28" rx="4" fill="#C9CDD4"/>
  <text x="140" y="768" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#FFFFFF">展厅 677㎡(72%)</text>
  <text x="760" y="768" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#1D2129">942㎡</text>

  <rect x="70" y="788" width="830" height="28" rx="4" fill="#F0F1F3"/>
  <text x="86" y="808" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#4E5969">2F</text>
  <rect x="130" y="788" width="472" height="28" rx="4" fill="url(#bar-exh)"/>
  <rect x="130" y="788" width="220" height="28" rx="4" fill="#86909C"/>
  <rect x="350" y="788" width="50" height="28" rx="4" fill="#69B1FF"/>
  <rect x="400" y="788" width="65" height="28" rx="4" fill="#4E5969"/>
  <rect x="465" y="788" width="107" height="28" rx="4" fill="#C9CDD4"/>
  <text x="140" y="808" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#FFFFFF">展厅 472㎡(44%)</text>
  <text x="760" y="808" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#1D2129">1,081㎡</text>

  <!-- ===== 右栏 ===== -->
  <rect x="980" y="124" width="900" height="928" fill="#FAFBFC" rx="10" filter="url(#shadow)"/>
  <rect x="998" y="140" width="220" height="36" rx="8" fill="url(#hdr)"/>
  <text x="1014" y="164" font-family="Microsoft YaHei,sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">建筑形象与交通设计</text>

  <!-- 立面 -->
  <text x="1010" y="216" font-family="Microsoft YaHei,sans-serif" font-size="15" font-weight="bold" fill="#1D2129">立面设计</text>
  <line x1="1010" y1="226" x2="1850" y2="226" stroke="#E5E6EB" stroke-width="1"/>

  <text x="1022" y="256" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#4E5969">● 造型：几何图形母题，简洁体块错位布置</text>
  <text x="1022" y="286" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#4E5969">● 主材：白色大理石 + Low-E中空玻璃（6+12A+6）</text>
  <text x="1022" y="316" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#4E5969">● 雨棚：钢框架 + PTFE膜材悬挑雨棚</text>
  <text x="1022" y="346" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#4E5969">● 室内：灰白主调 + 线性灯光 + 智能导视</text>

  <!-- 材料卡片 -->
  <rect x="1022" y="380" width="195" height="78" rx="6" fill="#FFFFFF" stroke="#E5E6EB" stroke-width="1" filter="url(#shadow-light)"/>
  <text x="1036" y="404" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#1D2129">外墙主面</text>
  <text x="1036" y="424" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#86909C">白色大理石</text>
  <text x="1036" y="444" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#C9CDD4">高强、科技感</text>

  <rect x="1240" y="380" width="195" height="78" rx="6" fill="#FFFFFF" stroke="#E5E6EB" stroke-width="1" filter="url(#shadow-light)"/>
  <text x="1254" y="404" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#1D2129">幕墙系统</text>
  <text x="1254" y="424" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#86909C">Low-E中空玻璃</text>
  <text x="1254" y="444" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#C9CDD4">节能保温</text>

  <rect x="1458" y="380" width="195" height="78" rx="6" fill="#FFFFFF" stroke="#E5E6EB" stroke-width="1" filter="url(#shadow-light)"/>
  <text x="1472" y="404" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#1D2129">入口雨棚</text>
  <text x="1472" y="424" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#86909C">钢框架+PTFE</text>
  <text x="1472" y="444" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#C9CDD4">轻盈现代</text>

  <rect x="1676" y="380" width="195" height="78" rx="6" fill="#FFFFFF" stroke="#E5E6EB" stroke-width="1" filter="url(#shadow-light)"/>
  <text x="1690" y="404" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#1D2129">展厅地面</text>
  <text x="1690" y="424" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#86909C">防静电架空地板</text>
  <text x="1690" y="444" font-family="Microsoft YaHei,sans-serif" font-size="10" fill="#C9CDD4">便于布线</text>

  <!-- 流线 -->
  <text x="1010" y="500" font-family="Microsoft YaHei,sans-serif" font-size="15" font-weight="bold" fill="#1D2129">流线组织</text>
  <line x1="1010" y1="510" x2="1850" y2="510" stroke="#E5E6EB" stroke-width="1"/>

  <text x="1022" y="536" font-family="Microsoft YaHei,sans-serif" font-size="13" font-weight="bold" fill="#165DFF">公众流线：</text>
  <path d="M1022 558 L1850 558" stroke="#165DFF" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1040" y="548" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#165DFF">入口</text>
  <text x="1140" y="548" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#165DFF">序厅</text>
  <text x="1240" y="548" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#165DFF">小①</text>
  <text x="1340" y="548" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#165DFF">小②</text>
  <text x="1440" y="548" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#165DFF">小③</text>
  <text x="1540" y="548" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#165DFF">大②</text>
  <text x="1760" y="548" font-family="Microsoft YaHei,sans-serif" font-size="11" fill="#165DFF">出口</text>

  <text x="1022" y="596" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#4E5969">● 贵宾：贵宾室 → 大展厅①（独立使用）</text>
  <text x="1022" y="620" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#4E5969">● 后勤：东侧入口 → 单跑楼梯 → 库房/设备间</text>
  <text x="1022" y="644" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#4E5969">● 办公：东侧入口 → 办公区（2F）/ 会议室</text>

  <!-- 疏散 -->
  <text x="1010" y="700" font-family="Microsoft YaHei,sans-serif" font-size="15" font-weight="bold" fill="#1D2129">疏散保障</text>
  <line x1="1010" y1="710" x2="1850" y2="710" stroke="#E5E6EB" stroke-width="1"/>

  <text x="1022" y="742" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#4E5969">● 每个防火分区 ≥ 2个安全出口</text>
  <text x="1022" y="770" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#4E5969">● 展览区任一点至出口 ≤ 30m</text>
  <text x="1022" y="798" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#4E5969">● 楼梯净宽 ≥ 1.2m，疏散门净宽 ≥ 1.4m</text>
  <text x="1022" y="826" font-family="Microsoft YaHei,sans-serif" font-size="14" fill="#4E5969">● 配套：疏散指示 + 应急照明 + 蓄光标识</text>

  <rect x="1022" y="862" width="800" height="36" rx="6" fill="#E8F0FF"/>
  <text x="1040" y="886" font-family="Microsoft YaHei,sans-serif" font-size="13" fill="#165DFF">耐火等级二级 · 防火分区最大 2,500㎡（设喷淋可扩至 5,000㎡）</text>

  <!-- 底部总结 -->
  <rect x="1010" y="920" width="830" height="44" rx="8" fill="#165DFF"/>
  <text x="1030" y="948" font-family="Microsoft YaHei,sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">总建筑面积约 2,600㎡ · 建筑高度 9.0m · 地上 2 层</text>

  <text x="80" y="1072" font-family="Microsoft YaHei,sans-serif" font-size="12" fill="#C9CDD4">来源：科技馆建筑设计说明</text>
</svg>
