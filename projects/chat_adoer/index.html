<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>被讨厌的勇气 — 阿德勒心理对话</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold:     #d4a76a;
    --gold-dk:  #b8894e;
    --teal:     #3d6b5e;
    --teal-lt:  #5a8c7e;
    --teal-dk:  #2a4f44;
    --ink:      #2c2418;
    --ink-70:   #5c5347;
    --ink-40:   #9c9489;
    --ink-20:   #cdc7be;
    --bubble-bot: #ffffff;
    --bubble-shadow: 0 1px 4px rgba(44,36,24,0.06), 0 4px 16px rgba(44,36,24,0.04);
    --card-bg: #ffffff;
    --page-bg: #f7f1e6;
    --sidebar-bg: #f0e9dd;
    --input-bg: #fdf8f3;
    --border-light: rgba(44,36,24,0.08);
    --accent: var(--gold);
    --primary: var(--teal);
    --primary-light: var(--teal-lt);
    --text: var(--ink);
    --text-soft: var(--ink-70);
    --text-muted: var(--ink-40);
    --chip-bg: rgba(255,255,255,0.70);
    --chip-border: rgba(61,107,94,0.20);
    --scrollbar: #e3d5c0;
    --sidebar-hover: rgba(61,107,94,0.06);
    --sidebar-active: rgba(61,107,94,0.10);
  }

  .dark {
    --page-bg: #13110e;
    --sidebar-bg: #1a1815;
    --card-bg: #1d1a17;
    --bubble-bot: #2d2823;
    --input-bg: #2a2520;
    --border-light: rgba(232,224,216,0.08);
    --bubble-shadow: 0 1px 4px rgba(0,0,0,0.2), 0 4px 16px rgba(0,0,0,0.15);
    --chip-bg: rgba(45,40,35,0.80);
    --chip-border: rgba(212,167,106,0.25);
    --scrollbar: #35302a;
    --sidebar-hover: rgba(212,167,106,0.06);
    --sidebar-active: rgba(212,167,106,0.10);
    --ink:      #e8e0d8;
    --ink-70:   #b0a89f;
    --ink-40:   #6b655d;
    --ink-20:   #423d37;
    --text: #e8e0d8;
    --text-soft: #b0a89f;
    --text-muted: #6b655d;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: "Noto Sans SC", -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--page-bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Paper texture ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: .35;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.012) 2px, rgba(0,0,0,.012) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,.006) 2px, rgba(0,0,0,.006) 4px);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border-light);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: transform .3s ease;
    z-index: 10;
  }
  .sidebar-header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border-light);
    flex-shrink: 0;
  }
  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .sidebar-brand .logo {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--teal-dk) 0%, var(--teal) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: #fff;
    flex-shrink: 0;
  }
  .sidebar-brand h2 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.3px;
  }
  .btn-new {
    width: 100%;
    padding: 10px 0;
    border-radius: 12px;
    border: 1.5px dashed var(--ink-40);
    background: transparent;
    color: var(--text-soft);
    font-size: 13.5px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-new:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: var(--sidebar-hover);
  }
  .btn-new span { font-size: 16px; }

  .conversation-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
  }
  .conversation-list::-webkit-scrollbar { width: 4px; }
  .conversation-list::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

  .conv-item {
    padding: 12px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: .15s;
    margin-bottom: 2px;
    position: relative;
  }
  .conv-item:hover {
    background: var(--sidebar-hover);
  }
  .conv-item.active {
    background: var(--sidebar-active);
    border-left: 3px solid var(--gold);
  }
  .conv-item .conv-title {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .conv-item .conv-meta {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 8px;
  }
  .conv-item .conv-preview {
    font-size: 11.5px;
    color: var(--text-soft);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 2px;
  }
  .conv-item .conv-del {
    position: absolute;
    right: 8px;
    top: 8px;
    width: 22px; height: 22px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-soft);
    font-size: 12px;
    cursor: pointer;
    opacity: 0;
    transition: .15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .conv-item:hover .conv-del { opacity: 1; }
  .conv-item .conv-del:hover { background: rgba(200,80,60,0.12); color: #c8503c; }

  .sidebar-footer {
    padding: 12px 16px 16px;
    border-top: 1px solid var(--border-light);
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  /* ─── Main chat area ─── */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--card-bg);
    min-width: 0;
    position: relative;
  }

  /* main header */
  .main-header {
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .main-header-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--teal-dk) 0%, var(--teal) 40%, var(--teal-lt) 100%);
    z-index: 0;
  }
  .main-header-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 120% 80% at 80% 120%, rgba(212,167,106,0.12) 0%, transparent 70%);
  }
  .main-header-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(100deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 41px);
  }

  .main-header-inner {
    position: relative;
    z-index: 1;
    padding: 16px 24px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .main-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .menu-btn {
    display: none;
    width: 34px; height: 34px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.20);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    align-items: center;
    justify-content: center;
    transition: .2s;
  }
  .menu-btn:hover { background: rgba(255,255,255,0.18); }

  .main-header-left .avatar-book {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    border: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
  }
  .main-header-left .header-text { min-width: 0; }
  .main-header-left h1 {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.4px;
  }
  .main-header-left .sub {
    font-size: 11.5px;
    color: rgba(255,255,255,0.60);
  }

  .main-header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .theme-toggle {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.20);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: .25s;
    backdrop-filter: blur(8px);
    flex-shrink: 0;
  }
  .theme-toggle:hover {
    background: rgba(255,255,255,0.18);
    transform: rotate(15deg);
  }

  /* ─── Messages ─── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px 12px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
    background:
      radial-gradient(ellipse 100% 50% at 50% 0%, rgba(212,167,106,0.03) 0%, transparent 80%);
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 76%;
    opacity: 0;
    animation: msgIn .4s ease forwards;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .msg.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }
  .msg .bubble {
    padding: 12px 18px;
    border-radius: 18px;
    font-size: 14.5px;
    line-height: 1.75;
    word-break: break-word;
    position: relative;
  }
  .msg.bot .bubble {
    background: var(--bubble-bot);
    box-shadow: var(--bubble-shadow);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .msg.bot .bubble::before {
    content: '';
    position: absolute;
    left: -6px; top: 12px;
    width: 10px; height: 10px;
    background: var(--bubble-bot);
    clip-path: polygon(100% 0, 0 0, 100% 100%);
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-lt) 100%);
    color: #fff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 2px 8px rgba(61,107,94,0.20);
  }
  .msg.user .bubble::after {
    content: '';
    position: absolute;
    right: -6px; top: 12px;
    width: 10px; height: 10px;
    background: var(--teal);
    clip-path: polygon(0 0, 100% 0, 0 100%);
  }
  .msg .avatar-small {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .msg.bot .avatar-small {
    background: linear-gradient(135deg, var(--gold) 0%, #c49555 100%);
    color: #fff;
  }
  .msg.user .avatar-small {
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-lt) 100%);
    color: #fff;
  }
  .time {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 5px;
    padding: 0 4px;
  }
  .msg.user .time { text-align: right; }

  .bubble .highlight {
    font-family: "Noto Serif SC", serif;
    color: var(--accent);
    font-weight: 600;
  }
  .bubble .quote-line {
    display: block;
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    margin: 6px 0;
    color: var(--ink-70);
    font-family: "Noto Serif SC", serif;
    font-style: italic;
    font-size: 14px;
    line-height: 1.7;
  }

  /* empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    color: var(--text-muted);
  }
  .empty-state .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: .4;
  }
  .empty-state h3 {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-soft);
    margin-bottom: 6px;
  }
  .empty-state p {
    font-size: 13px;
    line-height: 1.6;
    max-width: 280px;
  }

  /* ─── Suggestions ─── */
  .suggestions {
    padding: 6px 24px 14px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .suggestions button {
    font-size: 12.5px;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--chip-border);
    background: var(--chip-bg);
    backdrop-filter: blur(12px);
    color: var(--primary);
    cursor: pointer;
    white-space: nowrap;
    transition: all .25s ease;
    font-weight: 500;
    font-family: inherit;
    box-shadow: 0 1px 4px rgba(0,0,0,0.02);
  }
  .suggestions button:hover {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(61,107,94,0.20);
  }

  /* ─── Input ─── */
  .input-area {
    padding: 12px 24px 18px;
    border-top: 1px solid var(--border-light);
    flex-shrink: 0;
    background: var(--card-bg);
  }
  .input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--input-bg);
    border: 1.5px solid transparent;
    border-radius: 26px;
    padding: 2px 4px 2px 20px;
    transition: all .25s ease;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.04);
  }
  .input-wrap:focus-within {
    border-color: var(--gold);
    background: var(--card-bg);
    box-shadow: 0 0 0 3px rgba(212,167,106,0.12), inset 0 1px 3px rgba(0,0,0,0.04);
  }
  .input-wrap input {
    flex: 1;
    border: none;
    background: transparent;
    padding: 10px 0;
    font-size: 14px;
    outline: none;
    font-family: inherit;
    color: var(--text);
    min-width: 0;
  }
  .input-wrap input::placeholder {
    color: var(--text-muted);
    font-size: 13.5px;
  }
  .input-wrap button {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dk) 100%);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all .25s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(212,167,106,0.20);
  }
  .input-wrap button:hover {
    transform: scale(1.06);
    box-shadow: 0 4px 16px rgba(212,167,106,0.30);
  }
  .input-wrap button:active { transform: scale(0.94); }
  .input-wrap button:disabled {
    opacity: .35;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ─── Typing ─── */
  .typing {
    display: flex;
    gap: 5px;
    padding: 6px 0;
  }
  .typing span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--ink-40);
    animation: typing 1.4s infinite both;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes typing {
    0%, 80%, 100% { opacity: .25; transform: scale(.75); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ─── Mobile responsive ─── */
  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      transform: translateX(-100%);
      box-shadow: 4px 0 32px rgba(0,0,0,0.15);
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 9;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
    }
    .sidebar-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .menu-btn { display: flex; }
    .msg { max-width: 90%; }
  }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ─── Sidebar ─── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="logo">📖</div>
        <h2>我的对话</h2>
      </div>
      <button class="btn-new" id="btnNew">
        <span>+</span> 新对话
      </button>
    </div>
    <div class="conversation-list" id="convList"></div>
    <div class="sidebar-footer">
      对话自动保存至本地
    </div>
  </aside>

  <!-- ─── Main chat area ─── -->
  <div class="main-area" id="mainArea">
    <div class="main-header">
      <div class="main-header-bg"></div>
      <div class="main-header-inner">
        <div class="main-header-left">
          <button class="menu-btn" id="menuBtn">☰</button>
          <div class="avatar-book">📖</div>
          <div class="header-text">
            <h1>被讨厌的勇气</h1>
            <div class="sub">阿德勒心理学 · 哲人与青年的对话</div>
          </div>
        </div>
        <div class="main-header-right">
          <button class="theme-toggle" id="themeBtn">☀</button>
        </div>
      </div>
    </div>

    <!-- messages area -->
    <div class="messages" id="messages"></div>

    <!-- suggestions -->
    <div class="suggestions" id="suggestions"></div>

    <!-- input -->
    <div class="input-area">
      <div class="input-wrap">
        <input type="text" id="input" placeholder="说说你的困惑…" autofocus />
        <button id="sendBtn">→</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Emotion Detection ───────────────────────────────────
const EMOTIONS = {
  frustrated:  { words: ['好累','累了','疲惫','没劲','无力','绝望','放弃','不行了','受不了','撑不住'], label: '沮丧' },
  angry:       { words: ['气死','烦死','凭什么','可恶','混蛋','滚','愤怒','生气','火大'], label: '愤怒' },
  lost:        { words: ['不知道','怎么办','迷茫','困惑','不懂','不明白','想不通','没方向'], label: '迷茫' },
  anxious:     { words: ['担心','害怕','紧张','焦虑','不安','慌','恐惧','怕'], label: '焦虑' },
  sad:         { words: ['难过','伤心','哭','委屈','难受','心痛','悲伤','失落'], label: '悲伤' },
};

function detectEmotion(text) {
  for (const [key, val] of Object.entries(EMOTIONS)) {
    for (const w of val.words) {
      if (text.includes(w)) return key;
    }
  }
  return null;
}

const EMOTION_PREFIX = {
  frustrated: '听起来你最近很累。',
  angry:      '我能感受到你的愤怒。',
  lost:       '你似乎正处在一个迷茫的路口。',
  anxious:    '你心里有很多担心。',
  sad:        '那种难过的感觉，我能理解。',
};

// ─── Topic Engine (3-depth per topic) ────────────────────

const TOPICS = [
  {
    key: 'others_opinion',
    kw: ['在意看法','别人','眼光','评价','讨厌','嫌弃','认可','承认','赞同','看不起','瞧不起','议论','说三道四','不被理解','不被接受','被拒绝'],
    depth: [
      {

  "欢迎。如果你总是在意他人的评价，不妨想想阿德勒的那句话：<span class='quote-line'>别人怎么看你，那是别人的课题，与你无关。</span>",
  "人之所以感到不幸，并非因为过去或环境，而是因为缺乏<span class='highlight'>获得幸福的勇气</span>。你拥有那份勇气吗？",
];

const GENERIC_REPLIES = [
  "嗯，我明白。能再具体说说吗？",
  "你这么说，让我想起阿德勒的一个观点——<span class='quote-line'>人并不是受过去事件影响的被动存在，而是主动诠释自己生活的主体。</span>你觉得自己是怎么理解这件事的？",
  "我需要知道更多。你为什么会有这样的感觉？",
  "阿德勒说，<span class='quote-line'>重要的不是被给予了什么，而是如何去利用被给予的东西。</span>你现在的处境中，有什么是你还没利用起来的？",
  "我直接问你吧——你希望我帮你分析，还是你只是想说出来？两种都可以。",
  "你说的这个问题，表面上是A，但我怀疑根源在B。你觉得呢？",
  "嗯。这是一个很好的切入点。我们从这个话题继续深入吧。",
  "阿德勒会说：<span class='highlight'>你现在的选择决定了你的人生。</span>你提到这件事的时候，你觉得自己有哪些选择？",
];

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function pickShuffled(arr) {
  const i = Math.floor(Math.random() * arr.length);
  const item = arr[i];
  return item;
}

function stripHtml(str) {
  return str.replace(/<[^>]*>/g, '').trim();
}

// ─── Scoring Engine ────────────────────────────────────

function scoreTopics(text) {
  const userLower = text.toLowerCase();
  const scores = [];

  for (const topic of TOPICS) {
    let score = 0;
    for (const kw of topic.kw) {
      if (userLower.includes(kw.toLowerCase())) score += 1;
    }
    if (score > 0) scores.push({ key: topic.key, score, topic });
  }

  // also boost topic if recent context matches
  if (ctx.history.length > 0) {
    const lastTopicKey = ctx.history[ctx.history.length - 1].topicKey;
    if (lastTopicKey) {
      const same = scores.find(s => s.key === lastTopicKey);
      if (same) same.score += 0.3; // slight boost for continuing same topic
    }
  }

  scores.sort((a, b) => b.score - a.score);
  return scores;
}

function detectTopicChange(text) {
  const scores = scoreTopics(text);
  if (scores.length === 0) return null;

  const best = scores[0];

  // Check if user is switching topic
  if (ctx.history.length > 0) {
    const lastKey = ctx.history[ctx.history.length - 1].topicKey;
    if (lastKey && best.key !== lastKey && best.score >= 1) {
      // Topic change detected
      return { key: best.key, topic: best.topic, changed: true };
    }
    if (lastKey === best.key) {
      return { key: best.key, topic: best.topic, changed: false, continued: true };
    }
  }

  return best.score >= 1 ? { key: best.key, topic: best.topic, changed: false } : null;
}

// ─── Emotion Response ──────────────────────────────────

function getEmotionPrefix(emotion) {
  return EMOTION_PREFIX[emotion] || '';
}

function buildEmotionalResponse(text) {
  const emotion = detectEmotion(text);
  if (!emotion) return { emotion: null, text: '' };

  const prefix = EMOTION_PREFIX[emotion] || '';

  // Also try to store this emotion in context
  return { emotion, text: prefix };
}

// ─── Generate reply ────────────────────────────────────

function buildReply(text) {
  const userText = text.trim();

  // 1. Detect emotion
  const emotionResult = buildEmotionalResponse(userText);
  const emotion = emotionResult.emotion;

  // 2. Detect topic
  const topicResult = detectTopicChange(userText);

  // 3. Build reply
  if (!topicResult) {
    // No matching topic → use generic reply
    let reply = pick(GENERIC_REPLIES);

    // If there's emotion, prepend it
    if (emotion && emotionResult.text) {
      reply = emotionResult.text + '<br><br>' + reply;
    }

    // ~20% chance to ask a spontaneous follow-up
    if (Math.random() < 0.2 && ctx.lastBot) {
      reply += '<br><br>' + pick(['能告诉我更多吗？','你觉得呢？','你同意吗？']);
    }

    return reply;
  }

  const { topic, changed, continued } = topicResult;
  const topicKey = topic.key;

  // Determine depth level
  if (!ctx.topicDepth[topicKey]) {
    ctx.topicDepth[topicKey] = 0;
  }

  let depth = ctx.topicDepth[topicKey];

  // If topic changed, reset to 0 or keep previous depth?
  // Better: reset to 0 for new topic
  if (changed) {
    depth = 0;
    ctx.topicDepth[topicKey] = 0;
  }

  // Clamp depth
  const levelIndex = Math.min(depth, topic.depth.length - 1);
  const level = topic.depth[levelIndex];

  // Pick reply
  let reply = pick(level.replies);

  // Prepend emotion prefix if detected
  if (emotion && emotionResult.text) {
    reply = emotionResult.text + '<br><br>' + reply;
  }

  // Add follow-up question (~55% chance, higher on deeper levels)
  const followUpChance = 0.45 + (levelIndex * 0.08);
  if (Math.random() < followUpChance) {
    const question = pick(level.followUps);
    reply += '<br><br>' + question;
  }

  // Save context
  ctx.topicDepth[topicKey] = depth + 1;

  return reply;
}

// ─── Conversation Store ────────────────────────────────

const STORAGE_KEY = 'adoer_conversations';

function loadConvs() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveConvs(convs) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(convs));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function convTitle(messages) {
  for (const m of messages) {
    if (m.role === 'user') return m.text.replace(/<[^>]*>/g, '').slice(0, 20) + (m.text.length > 20 ? '…' : '');
  }
  return '新对话';
}

function convPreview(messages) {
  const last = messages[messages.length - 1];
  if (!last) return '';
  const text = last.role === 'user' ? last.text : last.text.replace(/<[^>]*>/g, '');
  return text.slice(0, 24) + (text.length > 24 ? '…' : '');
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + '分钟前';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + '小时前';
  const days = Math.floor(hrs / 24);
  return days + '天前';
}

// ─── State ─────────────────────────────────────────────

let conversations = loadConvs();
let currentId = null;
let isLoading = false;

// ─── DOM refs ─────────────────────────────────────────

const $msg = document.getElementById('messages');
const $input = document.getElementById('input');
const $send = document.getElementById('sendBtn');
const $suggest = document.getElementById('suggestions');
const $convList = document.getElementById('convList');
const $sidebar = document.getElementById('sidebar');
const $overlay = document.getElementById('sidebarOverlay');
const $menuBtn = document.getElementById('menuBtn');
const $themeBtn = document.getElementById('themeBtn');
const $btnNew = document.getElementById('btnNew');

// ─── UI functions ─────────────────────────────────────

function scrollBottom() {
  $msg.scrollTop = $msg.scrollHeight;
}

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const now = new Date();
  const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  if (role === 'bot') {
    div.innerHTML = `<div class="avatar-small">哲</div><div><div class="bubble">${text}</div><div class="time">${timeStr}</div></div>`;
  } else {
    div.innerHTML = `<div class="avatar-small">你</div><div><div class="bubble">${text.replace(/\n/g, '<br>')}</div><div class="time">${timeStr}</div></div>`;
  }
  $msg.appendChild(div);
  scrollBottom();
}

function addTyping() {
  if (document.getElementById('typing-indicator')) return;
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="avatar-small">哲</div><div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  $msg.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function removeSuggestions() {
  $suggest.innerHTML = '';
}

function showSuggestions() {
  if ($suggest.children.length > 0) return;
  const chips = ['我很在意别人的看法','我总是不自信','过去让我走不出来','我害怕改变','什么是课题分离？','怎样获得幸福？','我经常感到孤独'];
  chips.forEach(s => {
    const btn = document.createElement('button');
    btn.textContent = s;
    btn.addEventListener('click', () => reply(s));
    $suggest.appendChild(btn);
  });
}

function showEmpty() {
  $msg.innerHTML = `<div class="empty-state"><div class="empty-icon">📖</div><h3>开始一段新的对话</h3><p>点击上方话题，或输入你的困惑，与哲人对话</p></div>`;
}

function renderConversations() {
  $convList.innerHTML = '';
  if (conversations.length === 0) {
    $convList.innerHTML = '<div style="padding:24px 14px;text-align:center;color:var(--text-muted);font-size:13px;">暂无对话记录</div>';
    return;
  }
  const sorted = [...conversations].sort((a, b) => b.updatedAt - a.updatedAt);
  sorted.forEach(c => {
    const div = document.createElement('div');
    div.className = 'conv-item' + (c.id === currentId ? ' active' : '');
    div.innerHTML = `<button class="conv-del" data-id="${c.id}">✕</button><div class="conv-title">${c.title}</div><div class="conv-meta"><span>${timeAgo(c.updatedAt)}</span><span>${c.messages.length} 条消息</span></div><div class="conv-preview">${convPreview(c.messages)}</div>`;
    div.addEventListener('click', e => { if (!e.target.closest('.conv-del')) switchConv(c.id); });
    div.querySelector('.conv-del').addEventListener('click', e => { e.stopPropagation(); deleteConv(c.id); });
    $convList.appendChild(div);
  });
}

// ─── Conversation CRUD ────────────────────────────────

function newConv() {
  const c = { id: genId(), title: '新对话', messages: [], createdAt: Date.now(), updatedAt: Date.now() };
  conversations.unshift(c);
  saveConvs(conversations);
  switchConv(c.id);
  closeSidebar();
}

function switchConv(id) {
  if (isLoading) return;
  currentId = id;
  saveConvs(conversations);
  renderConversations();

  const c = conversations.find(x => x.id === id);
  if (!c) return;

  $msg.innerHTML = '';
  removeSuggestions();
  ctx.history = [];
  ctx.topicDepth = {};
  ctx.lastBot = null;
  ctx.totalExchanges = 0;

  if (c.messages.length === 0) {
    setTimeout(() => {
      const greeting = pick(GREETINGS);
      addMessage(greeting, 'bot');
      showSuggestions();
      scrollBottom();
      c.messages.push({ role: 'bot', text: greeting, time: new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) });
      saveConvs(conversations);
    }, 300);
  } else {
    c.messages.forEach(m => addMessage(m.text, m.role));
    if (c.messages.length <= 1 && c.messages[0]?.role === 'bot') showSuggestions();
    scrollBottom();
  }
}

function deleteConv(id) {
  if (!confirm('删除此对话？')) return;
  conversations = conversations.filter(x => x.id !== id);
  saveConvs(conversations);
  if (currentId === id) {
    currentId = null;
    $msg.innerHTML = '';
    removeSuggestions();
    $input.value = '';
    showEmpty();
  }
  renderConversations();
}

function closeSidebar() {
  $sidebar.classList.remove('open');
  $overlay.classList.remove('show');
}

function saveCurrentMessage(text, role) {
  const c = conversations.find(x => x.id === currentId);
  if (!c) return;
  const time = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
  c.messages.push({ role, text, time });
  c.updatedAt = Date.now();
  c.title = convTitle(c.messages);
  saveConvs(conversations);
  renderConversations();
}

// ─── Reply (core) ─────────────────────────────────────

function reply(text) {
  if (!text.trim() || isLoading) return;
  if (!currentId) newConv();

  isLoading = true;
  const userText = text.trim();

  addMessage(userText, 'user');
  saveCurrentMessage(userText, 'user');

  $input.value = '';
  $send.disabled = true;
  removeSuggestions();
  addTyping();

  const delay = 600 + Math.random() * 1400;

  setTimeout(() => {
    removeTyping();
    const answer = buildReply(userText);
    ctx.lastBot = answer;
    ctx.totalExchanges++;

    addMessage(answer, 'bot');
    saveCurrentMessage(answer, 'bot');
    isLoading = false;
    $send.disabled = false;
    $input.focus();
  }, delay);
}

// ─── Theme ────────────────────────────────────────────

let dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
if (dark) document.documentElement.classList.add('dark');
$themeBtn.addEventListener('click', () => {
  dark = !dark;
  document.documentElement.classList.toggle('dark', dark);
  $themeBtn.textContent = dark ? '☾' : '☀';
});
$themeBtn.textContent = dark ? '☾' : '☀';

// ─── Events ──────────────────────────────────────────

$send.addEventListener('click', () => reply($input.value));
$input.addEventListener('keydown', e => { if (e.key === 'Enter') reply($input.value); });
$btnNew.addEventListener('click', newConv);
$menuBtn.addEventListener('click', () => { $sidebar.classList.toggle('open'); $overlay.classList.toggle('show'); });
$overlay.addEventListener('click', closeSidebar);

// ─── Init ────────────────────────────────────────────

function init() {
  const sorted = [...conversations].sort((a, b) => b.updatedAt - a.updatedAt);
  if (sorted.length > 0) switchConv(sorted[0].id);
  else newConv();
  renderConversations();
}

init();
</script>
