<text x="600" y="35" class="ic-title" font-size="20" fill="#1A237E">Serial Communication Experiment - Proteus Simulation</text>
<text x="600" y="55" class="ic-title" font-size="11">Dual AT89C52 UART Mode 1 | 9600 bps | 11.0592MHz TH1=0xFD</text>
<text x="600" y="72" class="ic-title" font-size="11">Net Label: same label on different components = connected | K1->LED1  K2->OFF  K3->COUNT</text>
