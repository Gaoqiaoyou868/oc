<text x="30" y="800" class="t-desc" font-weight="bold" font-size="12">Experiment Operation:</text>
<text x="30" y="815" class="t-desc">1. Press K1 (INT0_A) -> Master A sends command via UART_TX -> Slave B receives on UART_RX -> LED1 ON</text>
<text x="30" y="830" class="t-desc">2. Press K2 (INT1_A) -> Master A sends different command -> Slave B -> Both LEDs OFF</text>
<text x="30" y="845" class="t-desc">3. Press K3 (INT0_B) -> Slave B sends count back -> Master A -> 7SEG display increments</text>
<text x="30" y="860" class="t-desc">4. (Optional) VT2 sends "11","10","21","20" via UART_RX to control Slave B LEDs</text>
<text x="30" y="875" class="t-desc">5. VT1 monitors UART_TX data from Master A to Slave B</text>
</svg>